[theme]
# Streamlit-native palette — widgets, toolbars, and pills follow this automatically.
primaryColor = "#a64b2a"
backgroundColor = "#f4efe6"
secondaryBackgroundColor = "#fffaf1"
textColor = "#1d232c"
font = "sans serif"

[theme.sidebar]
# Dark sidebar panel (matches dashboard_shared/constants.py THEME) — light text for contrast.
primaryColor = "#c6922b"
backgroundColor = "#1f2530"
secondaryBackgroundColor = "#171b22"
textColor = "#fbf6ee"
linkColor = "#fbf6ee"
borderColor = "#3a4250"

[server]
headless = true
enableXsrfProtection = true
enableCORS = false
